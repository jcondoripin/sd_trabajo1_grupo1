<!doctype html>
<html>
<head>
    <title>File Upload Mejorado</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/dropzone/5.9.3/min/dropzone.min.css">
    <style>
        .dz-message { font-size: 1.1em; }
    </style>
</head>
<body>
    <h1>Subida de Imágenes (máx. 5 MB)</h1>

    <form action="{{ url_for('upload_files') }}" class="dropzone" id="myDropzone"></form>

    <hr>
    <h2>Imágenes subidas:</h2>
    {% for file in files %}
        <img src="{{ url_for('uploaded_file', filename=file) }}" style="max-width: 120px; margin: 5px;" alt="{{ file }}">
    {% endfor %}

    <script src="https://cdnjs.cloudflare.com/ajax/libs/dropzone/5.9.3/min/dropzone.min.js"></script>
    <script>
        Dropzone.options.myDropzone = {
            paramName: "file",
            maxFilesize: 5,                    // 5 MB (cliente)
            acceptedFiles: "image/jpeg,image/png,image/gif",
            dictDefaultMessage: "Arrastra imágenes aquí o haz clic para seleccionar (máx. 5 MB)",
            dictFileTooBig: "El archivo es demasiado grande ({{filesize}} MB). Límite: 5 MB.",
            dictInvalidFileType: "Solo se permiten imágenes JPG, PNG y GIF.",
            addRemoveLinks: true,
            dictRemoveFile: "Eliminar",
            init: function() {
                this.on("success", function(file, response) {
                    console.log("Subida exitosa:", response);
                    // Opcional: recargar la página para ver la nueva imagen
                    // setTimeout(() => location.reload(), 800);
                });
                this.on("error", function(file, errorMessage) {
                    console.error(errorMessage);
                });
            }
        };
    </script>
</body>
</html>
